<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <div class="signup-container">
    <form class="signup-form" id="signup-form">
      <h2>Create Account</h2>

      <div class="input-group">
        <label>Name</label>
        <input type="text" name="name" placeholder="Enter your name" required  id="name"/>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email" required id="email"/>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required id="password"/>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" name="confirmPassword" placeholder="Confirm password" required />
      </div>

      <button type="submit" class="signup-btn" id="submit">Sign Up</button>

      <p class="footer-text">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </form>
  </div>


  <script src="/signup.js"></script>
</body>
</html>
